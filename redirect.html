<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Dev Academy - Generating Link</title>
  <style>
    /* Clean, Simple Slate Theme */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      text-align: center;
      box-sizing: border-box;
    }

    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin: 20px 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.4rem;
      margin-top: 0;
      margin-bottom: 12px;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .timer-display {
      font-size: 2.5rem;
      font-weight: 800;
      color: #6366f1;
      margin: 15px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }

    .btn-submit {
      background-color: #6366f1;
      color: white;
    }
    .btn-submit:hover:not(:disabled) {
      background-color: #4f46e5;
    }
    .btn-submit:disabled {
      background-color: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    /* Ad Banner Slots */
    .ad-slot {
      background-color: #1e293b;
      border: 1px dashed #475569;
      border-radius: 8px;
      padding: 20px;
      font-size: 0.75rem;
      color: #64748b;
      margin: 10px 0;
      box-sizing: border-box;
    }

    .ad-label {
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Top Ad Slot -->
    <div class="ad-slot" id="ad-top">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Header Banner)</div>
    </div>

    <!-- Redirection Card -->
    <div class="card">
      <h1>Super Dev Academy</h1>
      <p id="status-message">Please wait, your link will unlock shortly.</p>
      
      <!-- Simple Timer Display -->
      <div class="timer-display" id="timer">5</div>

      <!-- Action Redirect Button -->
      <button id="redirect-btn" class="btn btn-submit" disabled>Please Wait...</button>
    </div>

    <!-- Bottom Ad Slot -->
    <div class="ad-slot" id="ad-bottom">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Footer Banner)</div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const DESTINATION_URL = "https://www.google.com"; // Change to your destination website
    const COUNTDOWN_SECONDS = 5;                     // Time users must wait
    const GOOGLE_ADSENSE_ID = "";                     // E.g. "ca-pub-XXXXXXXXXXXXXXXX"
    const AD_SLOT_TOP_ID = "";                        // E.g. "1234567890"
    const AD_SLOT_BOTTOM_ID = "";                     // E.g. "0987654321"
    // ---------------------

    const timerElement = document.getElementById("timer");
    const redirectBtn = document.getElementById("redirect-btn");
    const statusMessage = document.getElementById("status-message");

    let timeLeft = COUNTDOWN_SECONDS;
    timerElement.innerText = timeLeft;

    // Countdown Timer Loop
    const interval = setInterval(() => {
      timeLeft--;
      timerElement.innerText = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(interval);
        
        // Timer Finished
        timerElement.innerText = "✓";
        timerElement.style.color = "#25d366";
        statusMessage.innerText = "Link is ready! Click the button below.";
        
        redirectBtn.removeAttribute("disabled");
        redirectBtn.innerText = "Go to Website";
      }
    }, 1000);

    // Redirect Click Handler
    redirectBtn.addEventListener("click", () => {
      window.location.href = DESTINATION_URL;
    });

    // Dynamic Google AdSense Loader
    if (GOOGLE_ADSENSE_ID) {
      const script = document.createElement("script");
      script.async = true;
      script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${GOOGLE_ADSENSE_ID}`;
      script.crossOrigin = "anonymous";
      document.head.appendChild(script);

      // Replace top ad slot if configured
      if (AD_SLOT_TOP_ID) {
        document.getElementById("ad-top").innerHTML = `
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="${GOOGLE_ADSENSE_ID}"
               data-ad-slot="${AD_SLOT_TOP_ID}"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        `;
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      }

      // Replace bottom ad slot if configured
      if (AD_SLOT_BOTTOM_ID) {
        document.getElementById("ad-bottom").innerHTML = `
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="${GOOGLE_ADSENSE_ID}"
               data-ad-slot="${AD_SLOT_BOTTOM_ID}"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        `;
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      }
    }
  </script>
</body>
</html>
