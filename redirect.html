<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Dev Academy - Generating Link</title>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6941003001365795"
     crossorigin="anonymous"></script>
  <style>
    /* Clean, scrollable slate list-like layout */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .content-wrapper {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-area {
      text-align: center;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 10px 0;
      color: #f8fafc;
      font-weight: 700;
    }

    p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin: 0;
      line-height: 1.5;
    }

    .timer-display {
      font-size: 3rem;
      font-weight: 800;
      color: #6366f1;
      text-align: center;
      margin: 10px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      box-sizing: border-box;
      text-align: center;
      transition: opacity 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-submit {
      background-color: #6366f1;
      color: white;
    }
    
    .btn-submit:disabled {
      background-color: #1e293b;
      color: #475569;
      border: 1px solid #334155;
      cursor: not-allowed;
      opacity: 1;
    }

    /* Ad Banner Placement */
    .ad-container {
      background-color: #1e293b;
      border: 1px dashed #334155;
      border-radius: 8px;
      padding: 24px 15px;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      box-sizing: border-box;
    }

    .ad-label {
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 1px;
      font-size: 0.7rem;
    }

    .footer {
      text-align: center;
      color: #475569;
      font-size: 0.8rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    
    <!-- Title and Subtext -->
    <div class="header-area">
      <h1>Super Dev Academy</h1>
      <p id="status-message">Please wait while we prepare your destination link...</p>
    </div>

    <!-- Ad Unit 1 -->
    <div class="ad-container" id="ad-top">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Header Banner)</div>
    </div>

    <!-- Countdown Timer -->
    <div class="timer-display" id="timer">5</div>

    <!-- Redirect Navigation Button -->
    <button id="redirect-btn" class="btn btn-submit" disabled>Please Wait...</button>

    <!-- Ad Unit 2 -->
    <div class="ad-container" id="ad-bottom">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Footer Banner)</div>
    </div>

    <!-- Simple Footer -->
    <div class="footer">
      &copy; 2026 Super Dev Academy.
    </div>

  </div>

  <script>
    // --- CONFIGURATION ---
    // The final URL encoded in Base64 (to prevent simple bots/source-view bypass).
    // "aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbQ==" decodes to "https://www.google.com".
    // Use an online tool or console.log(btoa("YOUR_URL")) to get the base64 code.
    const DESTINATION_URL_BASE64 = "aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbQ==";
    
    const COUNTDOWN_SECONDS = 5;                     // Wait duration in seconds
    const GOOGLE_ADSENSE_ID = "ca-pub-6941003001365795";                     // E.g. "ca-pub-XXXXXXXXXXXXXXXX"
    const AD_SLOT_TOP_ID = "";                        // E.g. "1234567890"
    const AD_SLOT_BOTTOM_ID = "";                     // E.g. "0987654321"
    
    const RATE_LIMIT_COOLDOWN_SEC = 15;              // Cooldown period in seconds between redirects
    // ---------------------

    const timerElement = document.getElementById("timer");
    const redirectBtn = document.getElementById("redirect-btn");
    const statusMessage = document.getElementById("status-message");

    // 1. Gating Security: Redirect back if user bypasses the page 1 check
    if (sessionStorage.getItem("sda_token") !== "authorized_session") {
      window.location.href = "index.html";
      throw new Error("Unauthorized redirect page access.");
    }

    // 2. Rate Limiting Security: Check cooldown in localStorage
    const lastRedirectTime = localStorage.getItem("sda_last_redirect_time");
    const now = Date.now();
    
    if (lastRedirectTime && (now - parseInt(lastRedirectTime)) < (RATE_LIMIT_COOLDOWN_SEC * 1000)) {
      const remainingSec = Math.ceil(((RATE_LIMIT_COOLDOWN_SEC * 1000) - (now - parseInt(lastRedirectTime))) / 1000);
      statusMessage.innerText = `Rate limit exceeded. Please wait ${remainingSec}s before attempting again.`;
      statusMessage.style.color = "#ef4444";
      timerElement.innerText = "✖";
      timerElement.style.color = "#ef4444";
      redirectBtn.setAttribute("disabled", "true");
      redirectBtn.innerText = "Rate Limited";
      throw new Error("Rate limit active.");
    }

    let timeLeft = COUNTDOWN_SECONDS;
    timerElement.innerText = timeLeft;

    // 3. Timer Interval Loop
    const interval = setInterval(() => {
      timeLeft--;
      timerElement.innerText = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(interval);
        
        timerElement.innerText = "✓";
        timerElement.style.color = "#25d366";
        statusMessage.innerText = "Your link is ready! Click the button below.";
        
        redirectBtn.removeAttribute("disabled");
        redirectBtn.innerText = "Go to Website";
      }
    }, 1000);

    // 4. Decrypted Redirection Click Handler
    redirectBtn.addEventListener("click", () => {
      // Set rate limiting timestamp
      localStorage.setItem("sda_last_redirect_time", Date.now().toString());

      // Prevent double-clicks / debouncing
      redirectBtn.setAttribute("disabled", "true");
      redirectBtn.innerText = "Redirecting securely...";

      // Decode target URL
      const destination = atob(DESTINATION_URL_BASE64);
      
      // Clean target redirect
      window.location.href = destination;
    });

    // Dynamic Google AdSense Loader
    if (GOOGLE_ADSENSE_ID) {
      const script = document.createElement("script");
      script.async = true;
      script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${GOOGLE_ADSENSE_ID}`;
      script.crossOrigin = "anonymous";
      document.head.appendChild(script);

      if (AD_SLOT_TOP_ID) {
        document.getElementById("ad-top").innerHTML = `
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="${GOOGLE_ADSENSE_ID}"
               data-ad-slot="${AD_SLOT_TOP_ID}"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        `;
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      }

      if (AD_SLOT_BOTTOM_ID) {
        document.getElementById("ad-bottom").innerHTML = `
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="${GOOGLE_ADSENSE_ID}"
               data-ad-slot="${AD_SLOT_BOTTOM_ID}"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        `;
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      }
    }
  </script>
</body>
</html>
