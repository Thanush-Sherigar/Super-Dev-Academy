<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Dev Academy - Unlock Link</title>
  <style>
    /* Extremely clean, scrollable list-like slate layout */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .content-wrapper {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-area {
      text-align: center;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 10px 0;
      color: #f8fafc;
      font-weight: 700;
    }

    p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin: 0;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      box-sizing: border-box;
      text-align: center;
      transition: opacity 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-tg {
      background-color: #0088cc;
      color: white;
    }

    .btn-wa {
      background-color: #25d366;
      color: white;
    }

    .btn-submit {
      background-color: #6366f1;
      color: white;
      margin-top: 10px;
    }
    
    .btn-submit:disabled {
      background-color: #1e293b;
      color: #475569;
      border: 1px solid #334155;
      cursor: not-allowed;
      opacity: 1;
    }

    /* Clean Ad Banner Placement */
    .ad-container {
      background-color: #1e293b;
      border: 1px dashed #334155;
      border-radius: 8px;
      padding: 24px 15px;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      box-sizing: border-box;
    }

    .ad-label {
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 1px;
      font-size: 0.7rem;
    }

    .footer {
      text-align: center;
      color: #475569;
      font-size: 0.8rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    
    <!-- Title and Subtext -->
    <div class="header-area">
      <h1>Super Dev Academy</h1>
      <p>Join our official communities to instantly verify and unlock your destination link.</p>
    </div>

    <!-- Ad Unit 1 -->
    <div class="ad-container" id="ad-top">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Header Banner)</div>
    </div>

    <!-- Telegram Button -->
    <a href="#" id="telegram-link" target="_blank" rel="noopener noreferrer" class="btn btn-tg">Join Telegram Channel</a>

    <!-- WhatsApp Button -->
    <a href="#" id="whatsapp-link" target="_blank" rel="noopener noreferrer" class="btn btn-wa">Join WhatsApp Group</a>

    <!-- Navigation Button -->
    <button id="continue-btn" class="btn btn-submit">Apply Now</button>

    <!-- Ad Unit 2 -->
    <div class="ad-container" id="ad-bottom">
      <div class="ad-label">ADVERTISEMENT</div>
      <div>Google Ad Placeholder (Footer Banner)</div>
    </div>

    <!-- Simple Footer -->
    <div class="footer">
      &copy; 2026 Super Dev Academy.
    </div>

  </div>

  <script>
    // --- CONFIGURATION ---
    const TELEGRAM_URL = "https://t.me/your_telegram_channel";
    const WHATSAPP_URL = "https://chat.whatsapp.com/your_whatsapp_group";
    // ---------------------

    const tgLink = document.getElementById("telegram-link");
    const waLink = document.getElementById("whatsapp-link");
    const continueBtn = document.getElementById("continue-btn");

    // Initialize links
    tgLink.href = TELEGRAM_URL;
    waLink.href = WHATSAPP_URL;

    let joined = false;

    function handleJoinClick() {
      joined = true;
      sessionStorage.setItem("sda_token", "authorized_session");
      continueBtn.removeAttribute("disabled");
      continueBtn.innerText = "Apply Now";
    }

    tgLink.addEventListener("click", handleJoinClick);
    waLink.addEventListener("click", handleJoinClick);

    continueBtn.addEventListener("click", () => {
      sessionStorage.setItem("sda_token", "authorized_session");
      window.location.href = "redirect.html";
    });
  </script>
</body>
</html>
